services:
  db:
    image: mysql:8.4
    container_name: wp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql:z
    networks:
      - wp-network

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: wp-php
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      WP_DOMAIN: ${WP_DOMAIN}
      WP_PORT: ${WP_PORT}
      WP_URL: ${WP_URL}
      WP_TITLE: ${WP_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
    volumes:
      - ./src:/var/www/html:z
    networks:
      - wp-network

  nginx:
    image: nginx:alpine
    container_name: wp-nginx
    restart: unless-stopped
    ports:
      - "${WP_PORT}:80"
    depends_on:
      - php
    volumes:
      - ./src:/var/www/html:ro,z
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,z
    networks:
      - wp-network

volumes:
  db_data:

networks:
  wp-network:
    driver: bridge
